<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" aria-label="Dreaming">
  <!-- Sun: top-half semicircle sitting on the horizon -->
  <path d="M 8.5 14 A 3.5 3.5 0 0 1 15.5 14" />
  <!-- Horizon lines: the sun's base ground line (split around the sun) and two layers below -->
  <line x1="3" y1="14" x2="7.5" y2="14" />
  <line x1="16.5" y1="14" x2="21" y2="14" />
  <line x1="3" y1="17" x2="21" y2="17" />
  <line x1="4.5" y1="19.5" x2="19.5" y2="19.5" />
  <!-- Seven rays radiating from the sun's centre (12, 14) -->
  <line x1="12" y1="9" x2="12" y2="4.5" />
  <line x1="9.9" y1="9.5" x2="8.4" y2="5.3" />
  <line x1="14.1" y1="9.5" x2="15.6" y2="5.3" />
  <line x1="8.1" y1="10.7" x2="5" y2="7.6" />
  <line x1="15.9" y1="10.7" x2="19" y2="7.6" />
  <line x1="7" y1="12.4" x2="3.5" y2="11" />
  <line x1="17" y1="12.4" x2="20.5" y2="11" />
</svg>
