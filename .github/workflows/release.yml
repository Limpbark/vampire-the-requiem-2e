name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into system.json
        run: |
          node -e "const fs=require('fs');const p='system.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version='${{ steps.version.outputs.version }}';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: Build system.zip
        run: |
          zip -r system.zip . \
            -x ".git/*" ".github/*" "packs-src/*" "node_modules/*" "screenshots/*" "*.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release for ${GITHUB_REF_NAME}." \
            system.json system.zip
